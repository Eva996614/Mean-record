<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="餐饮记账">
<title>餐饮成本记账</title>
<style>
  :root {
    --bg:#f5f4f0;--surface:#fff;--surface2:#f0efe9;--text:#1a1916;--text2:#6b6a64;--text3:#a8a79f;
    --accent:#2d6a4f;--accent-bg:#e8f4ee;--accent-text:#1a4a33;
    --warn:#92400e;--warn-bg:#fef3c7;--danger:#991b1b;--danger-bg:#fee2e2;
    --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.14);--radius:14px;--radius-sm:8px;
    --font:'PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  }
  @media(prefers-color-scheme:dark){:root{
    --bg:#111110;--surface:#1c1c1a;--surface2:#252522;--text:#f0efe9;--text2:#a8a79f;--text3:#5a5a54;
    --accent:#4ade80;--accent-bg:#14391f;--accent-text:#86efac;
    --warn:#fbbf24;--warn-bg:#2d1f00;--danger:#f87171;--danger-bg:#2d0a0a;
    --border:rgba(255,255,255,0.08);--border2:rgba(255,255,255,0.14);
  }}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);font-family:var(--font);color:var(--text)}
  body{display:flex;flex-direction:column;max-width:480px;margin:0 auto}
  .header{padding:16px 20px 0}
  .header h1{font-size:22px;font-weight:700;letter-spacing:-0.5px}
  .header p{font-size:13px;color:var(--text3);margin-top:2px}
  .tabs{display:flex;gap:6px;padding:14px 20px 12px}
  .tab{flex:1;padding:9px 0;font-size:13px;font-weight:600;text-align:center;border:1.5px solid var(--border);border-radius:10px;background:var(--surface);color:var(--text2);cursor:pointer}
  .tab.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-text)}
  .content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 100px}
  .section{display:none}.section.active{display:block}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
  .card-title{font-size:14px;font-weight:700;margin-bottom:14px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
  .form-full{margin-bottom:10px}
  .form-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:5px}
  input[type=text],input[type=number],input[type=date],select{width:100%;padding:10px 12px;font-size:15px;font-family:var(--font);background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);outline:none;-webkit-appearance:none;appearance:none}
  input:focus,select:focus{border-color:var(--accent)}
  .btn{width:100%;padding:12px;font-size:15px;font-weight:600;font-family:var(--font);border-radius:var(--radius-sm);border:1.5px solid var(--border2);background:var(--surface);color:var(--text);cursor:pointer;margin-top:4px}
  .btn:active{opacity:0.7}
  .btn-primary{background:var(--accent-bg);border-color:var(--accent);color:var(--accent-text)}
  .btn-sm{width:auto;padding:7px 14px;font-size:13px;margin-top:0}
  .btn-danger-sm{padding:5px 10px;font-size:12px;width:auto;margin-top:0;border-color:var(--danger-bg);background:var(--danger-bg);color:var(--danger)}
  .btn-scan{display:flex;align-items:center;justify-content:center;gap:8px;background:var(--surface2);border:1.5px dashed var(--accent);color:var(--accent-text);font-weight:600;padding:13px;border-radius:var(--radius-sm);width:100%;font-size:15px;cursor:pointer;margin-bottom:10px;font-family:var(--font)}
  .stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
  .stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
  .stat-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
  .stat-value{font-size:22px;font-weight:700;letter-spacing:-0.5px}
  .badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
  .badge-green{background:var(--accent-bg);color:var(--accent-text)}
  .badge-amber{background:var(--warn-bg);color:var(--warn)}
  .badge-red{background:var(--danger-bg);color:var(--danger)}
  .row{padding:12px 0;border-bottom:1px solid var(--border)}
  .row:last-child{border-bottom:none}
  .row-title{font-size:14px;font-weight:600}
  .row-meta{font-size:12px;color:var(--text3);margin-top:2px}
  .row-sub{font-size:12px;color:var(--text2);margin-top:2px;line-height:1.4}
  .bar-bg{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin:8px 0 4px}
  .bar-fill{height:100%;border-radius:3px;background:var(--accent);transition:width 0.3s}
  .nut-row{margin-bottom:10px}
  .nut-top{display:flex;justify-content:space-between;font-size:12px;color:var(--text2);margin-bottom:4px}
  .used-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .used-row select{flex:2;font-size:13px;padding:8px 10px}
  .used-row input{flex:1;font-size:13px;padding:8px 10px;max-width:90px}
  .empty{text-align:center;padding:36px 20px;color:var(--text3);font-size:14px;line-height:1.6}
  .empty-icon{font-size:36px;margin-bottom:8px}
  .sec-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin:16px 0 8px 2px}
  .cost-tag{font-size:16px;font-weight:700;color:var(--accent-text)}
  .divider{height:1px;background:var(--border);margin:12px 0}
  .flex-between{display:flex;justify-content:space-between;align-items:center}
  .fetch-status{font-size:13px;color:var(--accent-text);background:var(--accent-bg);border-radius:var(--radius-sm);padding:8px 12px;margin-bottom:10px;display:none}
  .fetch-status.visible{display:block}
  .fetch-status.error{color:var(--danger);background:var(--danger-bg)}
  .scanner-overlay{display:none;position:fixed;inset:0;z-index:999;background:rgba(0,0,0,0.92);flex-direction:column;align-items:center;justify-content:center}
  .scanner-overlay.active{display:flex}
  .scanner-box{width:280px;height:280px;position:relative;border-radius:16px;overflow:hidden}
  #scanner-video{width:100%;height:100%;object-fit:cover}
  .scanner-frame{position:absolute;inset:0;border:2px solid rgba(255,255,255,0.2);border-radius:16px}
  .scan-line{position:absolute;left:10%;right:10%;height:2px;background:#4ade80;animation:scanmove 2s ease-in-out infinite;top:50%}
  @keyframes scanmove{0%,100%{top:15%}50%{top:85%}}
  .c-tl{position:absolute;top:8px;left:8px;width:28px;height:28px;border-top:3px solid #4ade80;border-left:3px solid #4ade80;border-radius:4px 0 0 0}
  .c-tr{position:absolute;top:8px;right:8px;width:28px;height:28px;border-top:3px solid #4ade80;border-right:3px solid #4ade80;border-radius:0 4px 0 0}
  .c-bl{position:absolute;bottom:8px;left:8px;width:28px;height:28px;border-bottom:3px solid #4ade80;border-left:3px solid #4ade80;border-radius:0 0 0 4px}
  .c-br{position:absolute;bottom:8px;right:8px;width:28px;height:28px;border-bottom:3px solid #4ade80;border-right:3px solid #4ade80;border-radius:0 0 4px 0}
  .scanner-hint{color:rgba(255,255,255,0.7);font-size:14px;margin-top:20px;text-align:center}
  .scanner-status{color:#4ade80;font-size:13px;margin-top:8px;min-height:20px;text-align:center;padding:0 20px}
  .scanner-close{margin-top:24px;padding:11px 32px;background:rgba(255,255,255,0.12);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:white;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font)}
</style>
</head>
<body>
<div class="header"><h1>餐饮记账</h1><p>精准追踪每餐成本与营养</p></div>
<div class="tabs">
  <button class="tab active" onclick="switchTab('inventory')">食材库</button>
  <button class="tab" onclick="switchTab('meal')">记餐食</button>
  <button class="tab" onclick="switchTab('stats')">统计</button>
</div>
<div class="content">
  <div id="tab-inventory" class="section active">
    <div class="card">
      <div class="card-title">添加食材</div>
      <button class="btn-scan" onclick="openScanner()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/><rect x="7" y="7" width="10" height="10" rx="1"/></svg>
        扫描条形码自动填入
      </button>
      <div id="fetch-status" class="fetch-status"></div>
      <div class="form-full"><div class="form-label">食材名称</div><input type="text" id="ing-name" placeholder="例：鸡胸肉"></div>
      <div class="form-grid">
        <div><div class="form-label">购买量</div><input type="number" id="ing-qty" placeholder="500"></div>
        <div><div class="form-label">单位</div><select id="ing-unit"><option>g</option><option>kg</option><option>ml</option><option>L</option><option>个</option><option>包</option><option>oz</option><option>lb</option></select></div>
      </div>
      <div class="form-full"><div class="form-label">花费 (USD $)</div><input type="number" id="ing-price" step="0.01" placeholder="5.99"></div>
      <div class="form-grid">
        <div><div class="form-label">热量 (kcal/100g)</div><input type="number" id="ing-cal" placeholder="165"></div>
        <div><div class="form-label">蛋白质 (g/100g)</div><input type="number" id="ing-protein" placeholder="31"></div>
      </div>
      <div class="form-full"><div class="form-label">碳水化合物 (g/100g)</div><input type="number" id="ing-carbs" placeholder="0"></div>
      <button class="btn btn-primary" onclick="addIngredient()">+ 添加到库存</button>
    </div>
    <div class="sec-label">当前库存</div>
    <div id="inventory-list"></div>
  </div>

  <div id="tab-meal" class="section">
    <div class="card">
      <div class="card-title">记录这餐</div>
      <div class="form-full"><div class="form-label">餐食名称</div><input type="text" id="meal-name" placeholder="例：番茄鸡蛋炒饭"></div>
      <div class="form-full"><div class="form-label">日期</div><input type="date" id="meal-date"></div>
      <div class="divider"></div>
      <div class="sec-label" style="margin-top:0">用了哪些食材</div>
      <div id="used-ingredients"></div>
      <button class="btn btn-sm" style="margin-bottom:14px" onclick="addUsedRow()">+ 添加食材</button>
      <button class="btn btn-primary" onclick="saveMeal()">保存这餐 ✓</button>
    </div>
    <div class="sec-label">最近记录</div>
    <div id="meal-list"></div>
  </div>

  <div id="tab-stats" class="section">
    <div class="stat-grid">
      <div class="stat"><div class="stat-label">本周花费</div><div class="stat-value" id="stat-week">$0.00</div></div>
      <div class="stat"><div class="stat-label">本月花费</div><div class="stat-value" id="stat-month">$0.00</div></div>
      <div class="stat"><div class="stat-label">餐均成本</div><div class="stat-value" id="stat-avg">$0.00</div></div>
      <div class="stat"><div class="stat-label">总计记录</div><div class="stat-value" id="stat-count">0</div></div>
    </div>
    <div class="card"><div class="card-title">营养摄入（最近一餐）</div><div id="nutrition-display"><div class="empty"><div class="empty-icon">🥗</div>还没有餐食记录</div></div></div>
    <div class="card"><div class="card-title">每餐成本明细</div><div id="cost-breakdown"><div class="empty"><div class="empty-icon">📊</div>暂无数据</div></div></div>
  </div>
</div>

<div class="scanner-overlay" id="scanner-overlay">
  <div class="scanner-box">
    <video id="scanner-video" autoplay playsinline muted></video>
    <div class="scanner-frame"></div>
    <div class="scan-line"></div>
    <div class="c-tl"></div><div class="c-tr"></div><div class="c-bl"></div><div class="c-br"></div>
  </div>
  <div class="scanner-hint">将条形码对准框内</div>
  <div class="scanner-status" id="scanner-status">正在启动摄像头…</div>
  <button class="scanner-close" onclick="closeScanner()">取消</button>
</div>

<script src="https://unpkg.com/@zxing/library@0.18.6/umd/index.min.js"></script>
<script>
let ingredients=JSON.parse(localStorage.getItem('mc_ingredients')||'[]');
let meals=JSON.parse(localStorage.getItem('mc_meals')||'[]');
let usedRows=[];
let codeReader=null;
let scanActive=false;

function persist(){localStorage.setItem('mc_ingredients',JSON.stringify(ingredients));localStorage.setItem('mc_meals',JSON.stringify(meals));}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((b,i)=>b.classList.toggle('active',['inventory','meal','stats'][i]===t));
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='inventory')renderInventory();
  if(t==='meal'){renderUsedRows();renderMealList();}
  if(t==='stats')renderStats();
}

async function openScanner(){
  document.getElementById('scanner-overlay').classList.add('active');
  document.getElementById('scanner-status').textContent='正在启动摄像头…';
  try{
    if(typeof ZXing==='undefined'){
      document.getElementById('scanner-status').textContent='扫码库加载中，请稍候…';
      await new Promise(r=>setTimeout(r,2000));
    }
    codeReader=new ZXing.BrowserMultiFormatReader();
    scanActive=true;
    document.getElementById('scanner-status').textContent='对准条形码即可自动识别';
    await codeReader.decodeFromVideoDevice(null,'scanner-video',(result,err)=>{
      if(result&&scanActive){
        scanActive=false;
        const barcode=result.getText();
        document.getElementById('scanner-status').textContent='识别成功！查询中…';
        fetchProduct(barcode);
      }
    });
  }catch(e){
    document.getElementById('scanner-status').textContent='摄像头启动失败，请检查权限设置';
  }
}

function closeScanner(){
  scanActive=false;
  if(codeReader){try{codeReader.reset();}catch(e){}codeReader=null;}
  document.getElementById('scanner-overlay').classList.remove('active');
}

async function fetchProduct(barcode){
  closeScanner();
  const el=document.getElementById('fetch-status');
  el.className='fetch-status visible';
  el.textContent='正在查询条形码 '+barcode+' 的食品信息…';
  try{
    const res=await fetch('https://world.openfoodfacts.org/api/v0/product/'+barcode+'.json');
    const data=await res.json();
    if(data.status===1&&data.product){
      const p=data.product;
      const name=p.product_name_zh||p.product_name||p.product_name_en||'';
      const cal=Math.round(p.nutriments?.['energy-kcal_100g']||p.nutriments?.['energy-kcal']||0);
      const prot=parseFloat((p.nutriments?.proteins_100g||0).toFixed(1));
      const qty=parseFloat(p.quantity)||'';
      if(name)document.getElementById('ing-name').value=name;
      if(cal)document.getElementById('ing-cal').value=cal;
      if(prot)document.getElementById('ing-protein').value=prot;
    const carbs=parseFloat((p.nutriments?.carbohydrates_100g||0).toFixed(1));
    if(carbs)document.getElementById('ing-carbs').value=carbs;
      if(qty)document.getElementById('ing-qty').value=qty;
      el.textContent='已自动填入：'+(name||'未知食品')+(cal?' · '+cal+'kcal/100g':'')+(prot?' · 蛋白质'+prot+'g':'')+(carbs?' · 碳水'+carbs+'g':'')+'。请补充购买量和花费。';
    }else{
      el.className='fetch-status visible error';
      el.textContent='未找到该条形码的食品信息，请手动填写。';
    }
  }catch(e){
    el.className='fetch-status visible error';
    el.textContent='查询失败，请检查网络连接后重试。';
  }
}

function renderInventory(){
  const el=document.getElementById('inventory-list');
  if(!ingredients.length){el.innerHTML='<div class="empty"><div class="empty-icon">🛒</div>还没有食材，先添加一些吧</div>';return;}
  el.innerHTML=ingredients.map((ing,i)=>{
    const pct=Math.min(100,Math.round(ing.remaining/ing.qty*100));
    const[bc,bl]=pct>50?['badge-green','充足']:pct>20?['badge-amber','偏少']:['badge-red','快没了'];
    const uc=(ing.price/ing.qty).toFixed(3);
    return `<div class="card" style="margin-bottom:10px">
      <div class="flex-between" style="margin-bottom:4px"><div class="row-title">${ing.name}</div><span class="badge ${bc}">${bl}</span></div>
      <div class="row-sub">剩余 <b>${ing.remaining.toFixed(0)}</b>${ing.unit} / 共 ${ing.qty}${ing.unit} · $${uc}/1${ing.unit}</div>
      <div class="row-meta">热量 ${ing.cal||'—'} kcal/100g · 蛋白质 ${ing.protein||'—'} g · 碳水 ${ing.carbs||'—'} g</div>
      <div class="bar-bg"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div style="text-align:right"><button class="btn btn-danger-sm" onclick="deleteIng(${i})">删除</button></div>
    </div>`;
  }).join('');
}

function addIngredient(){
  const name=document.getElementById('ing-name').value.trim();
  const qty=parseFloat(document.getElementById('ing-qty').value);
  const price=parseFloat(document.getElementById('ing-price').value);
  const unit=document.getElementById('ing-unit').value;
  const cal=parseFloat(document.getElementById('ing-cal').value)||0;
  const protein=parseFloat(document.getElementById('ing-protein').value)||0;
  const carbs=parseFloat(document.getElementById('ing-carbs').value)||0;
  if(!name||!qty||!price){alert('请填写名称、购买量和花费');return;}
  ingredients.push({name,qty,price,unit,cal,protein,carbs,remaining:qty});
  persist();
  ['ing-name','ing-qty','ing-price','ing-cal','ing-protein','ing-carbs'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fetch-status').className='fetch-status';
  renderInventory();
}

function deleteIng(i){
  if(!confirm('确认删除「'+ingredients[i].name+'」？'))return;
  ingredients.splice(i,1);persist();renderInventory();
}

function renderUsedRows(){
  const el=document.getElementById('used-ingredients');
  if(!usedRows.length){el.innerHTML='';return;}
  el.innerHTML=usedRows.map((r,i)=>`
    <div class="used-row">
      <select onchange="usedRows[${i}].ingIdx=parseInt(this.value)">
        <option value="-1">选食材…</option>
        ${ingredients.map((ing,j)=>`<option value="${j}" ${r.ingIdx===j?'selected':''}>${ing.name}(${ing.unit})</option>`).join('')}
      </select>
      <input type="number" placeholder="用量" value="${r.amount||''}" onchange="usedRows[${i}].amount=parseFloat(this.value)||0">
      <button class="btn btn-danger-sm" onclick="usedRows.splice(${i},1);renderUsedRows()">✕</button>
    </div>`).join('');
}

function addUsedRow(){
  if(!ingredients.length){alert('请先在「食材库」添加食材');return;}
  usedRows.push({ingIdx:-1,amount:0});renderUsedRows();
}

function saveMeal(){
  const name=document.getElementById('meal-name').value.trim();
  const date=document.getElementById('meal-date').value||new Date().toISOString().split('T')[0];
  if(!name){alert('请填写餐食名称');return;}
  const used=usedRows.filter(r=>r.ingIdx>=0&&r.amount>0);
  if(!used.length){alert('请至少添加一种食材并填写用量');return;}
  let cost=0,cal=0,protein=0,carbs=0;const items=[];
  for(const r of used){
    const ing=ingredients[r.ingIdx];if(!ing)continue;
    const c=(ing.price/ing.qty)*r.amount;
    cost+=c;cal+=(ing.cal||0)*r.amount/100;protein+=(ing.protein||0)*r.amount/100;carbs+=(ing.carbs||0)*r.amount/100;
    items.push({name:ing.name,amount:r.amount,unit:ing.unit,cost:parseFloat(c.toFixed(4))});
    ing.remaining=Math.max(0,ing.remaining-r.amount);
  }
  meals.unshift({name,date,cost:parseFloat(cost.toFixed(4)),cal:Math.round(cal),protein:parseFloat(protein.toFixed(1)),carbs:parseFloat(carbs.toFixed(1)),items});
  persist();
  document.getElementById('meal-name').value='';usedRows=[];renderUsedRows();renderMealList();
}

function renderMealList(){
  const el=document.getElementById('meal-list');
  if(!meals.length){el.innerHTML='<div class="empty"><div class="empty-icon">🍽️</div>还没有记录，吃完一顿来记一下</div>';return;}
  el.innerHTML=meals.slice(0,15).map((m,i)=>`
    <div class="card" style="margin-bottom:10px">
      <div class="flex-between">
        <div><div class="row-title">${m.name}</div><div class="row-meta">${m.date} · ${m.cal} kcal · 蛋白质 ${m.protein}g · 碳水 ${m.carbs||0}g</div></div>
        <div style="text-align:right"><div class="cost-tag">$${m.cost.toFixed(2)}</div><button class="btn btn-danger-sm" style="margin-top:6px" onclick="deleteMeal(${i})">删除</button></div>
      </div>
      <div style="font-size:12px;color:var(--text3);margin-top:8px">${m.items.map(it=>it.name+' '+it.amount+it.unit).join(' · ')}</div>
    </div>`).join('');
}

function deleteMeal(i){
  if(!confirm('确认删除「'+meals[i].name+'」？'))return;
  meals.splice(i,1);persist();renderMealList();renderStats();
}

function renderStats(){
  const now=new Date(),weekAgo=new Date(now-7*864e5),monthStart=new Date(now.getFullYear(),now.getMonth(),1);
  let week=0,month=0,total=0;
  meals.forEach(m=>{const d=new Date(m.date);total+=m.cost;if(d>=weekAgo)week+=m.cost;if(d>=monthStart)month+=m.cost;});
  document.getElementById('stat-week').textContent='$'+week.toFixed(2);
  document.getElementById('stat-month').textContent='$'+month.toFixed(2);
  document.getElementById('stat-avg').textContent=meals.length?'$'+(total/meals.length).toFixed(2):'$0.00';
  document.getElementById('stat-count').textContent=meals.length+' 餐';
  const nutEl=document.getElementById('nutrition-display');
  if(meals.length){
    const m=meals[0];
    const cp=Math.min(100,Math.round(m.cal/2000*100)),pp=Math.min(100,Math.round(m.protein/50*100));
    nutEl.innerHTML=`<div style="font-size:13px;color:var(--text2);margin-bottom:12px">${m.name} · ${m.date}</div>
      <div class="nut-row"><div class="nut-top"><span>热量</span><span>${m.cal} kcal</span></div><div class="bar-bg"><div class="bar-fill" style="width:${cp}%;background:#2d6a4f"></div></div></div>
      <div class="nut-row"><div class="nut-top"><span>蛋白质</span><span>${m.protein} g</span></div><div class="bar-bg"><div class="bar-fill" style="width:${pp}%;background:#1e40af"></div></div></div>
      <div class="nut-row"><div class="nut-top"><span>碳水化合物</span><span>${m.carbs||0} g</span></div><div class="bar-bg"><div class="bar-fill" style="width:${Math.min(100,Math.round((m.carbs||0)/275*100))}%;background:#b45309"></div></div></div>`;
  }else{nutEl.innerHTML='<div class="empty"><div class="empty-icon">🥗</div>还没有餐食记录</div>';}
  const cbEl=document.getElementById('cost-breakdown');
  if(!meals.length){cbEl.innerHTML='<div class="empty"><div class="empty-icon">📊</div>暂无数据</div>';return;}
  cbEl.innerHTML=meals.slice(0,10).map(m=>`<div class="row"><div class="flex-between"><div class="row-title">${m.name}</div><div class="cost-tag">$${m.cost.toFixed(2)}</div></div><div class="row-meta">${m.date}</div></div>`).join('');
}

document.getElementById('meal-date').value=new Date().toISOString().split('T')[0];
renderInventory();renderMealList();
</script>
</body>
</html>
